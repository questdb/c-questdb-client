# Sets two variables for the Maven steps that follow: MAVEN_SETTINGS_FILE, the
# settings file Maven runs with, and MAVEN_RUN_OPTS, its download-retry
# options. Those steps pass both on to Maven as `-s $(MAVEN_SETTINGS_FILE)`
# and $(MAVEN_RUN_OPTS).
#
# Runs after templates/clone_questdb.yaml. Both settings files belong to the
# questdb repository, and that template is what clones it into
# $(Build.SourcesDirectory)/questdb, so before it has run the files are not on
# this machine at all.
#
# Which of the two to use is decided by asking maven.internal, from the
# machine itself, whether it answers. maven-settings-hetzner.xml sends every
# Maven Central request to that cache and names nothing to fall back on if it
# is unreachable, and only machines on the Hetzner private network can reach
# it. Handing that file to a Microsoft-provided macOS or Windows machine would
# therefore fail every download, which is why reachability is what gets
# tested: the hetzner-incus jobs download through the cache, and every other
# machine uses the plain maven-settings.xml and downloads from Maven Central.
#
# MAVEN_RUN_OPTS makes Maven retry a download that fails instead of giving up
# at the first failure. The macOS and Windows jobs need this because they
# download from Maven Central across the public internet, where the occasional
# failed request is normal:
#   * maven.resolver.transport=wagon selects the HTTP transport that the three
#     options below configure.
#   * retryHandler.count is how many attempts a download gets.
#   * retryHandler.nonRetryableClasses replaces the list of exceptions Maven
#     refuses to retry. ConnectException is on that list by default, so naming
#     an exception that never occurs here leaves the list effectively empty,
#     and a refused connection gets retried too.
#   * httpconnectionManager.ttlSeconds keeps connections open for reuse, so
#     downloading many files does not open a fresh connection for each one.
#
# The echo lines run without `set -x`. Azure treats any line containing
# `##vso[` as a command and takes the text after `]` as the value; tracing the
# echo would print the closing quote that bash adds, and that quote would end
# up inside the variable.
steps:
  - bash: |
      SETTINGS_DIR="$(Build.SourcesDirectory)/questdb/ci"
      if curl -sf --connect-timeout 2 http://maven.internal:8081/ > /dev/null 2>&1; then
        echo "Cache at maven.internal answers: downloading through it"
        echo "##vso[task.setvariable variable=MAVEN_SETTINGS_FILE]$SETTINGS_DIR/maven-settings-hetzner.xml"
      else
        echo "Cache at maven.internal is unreachable: downloading from Maven Central"
        echo "##vso[task.setvariable variable=MAVEN_SETTINGS_FILE]$SETTINGS_DIR/maven-settings.xml"
      fi
      echo "##vso[task.setvariable variable=MAVEN_RUN_OPTS]-Dmaven.resolver.transport=wagon -Dmaven.wagon.httpconnectionManager.ttlSeconds=30 -Dmaven.wagon.http.retryHandler.count=3 -Dmaven.wagon.http.retryHandler.nonRetryableClasses=java.io.NotSerializableException"
    displayName: "Choose Maven settings file and retry options"
