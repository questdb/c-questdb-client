# Clone questdb master and decide how the questdb-client jar is supplied.
#
# questdb's build pulls in org.questdb:questdb-client at the version held in
# core/pom.xml's questdb.client.version property. When that version is a
# release (e.g. 1.3.0) the jar is fetched from Maven Central, so a plain
# `git clone` is enough. When it's a -SNAPSHOT (e.g. 1.3.1-SNAPSHOT) the jar
# is published nowhere — it must be built from the java-questdb-client
# submodule via questdb's `local-client` profile. Skipping that step fails
# the questdb build with:
#   Could not find artifact org.questdb:questdb-client:jar:<version>
#
# This mirrors questdb/questdb's ci/templates/detect-local-client.yml: read
# the version, and for a SNAPSHOT check out the submodule and export
# CLIENT_PROFILE=",local-client" so the "Compile QuestDB" Maven step appends
# the profile (options: "... -Pbuild-web-console$(CLIENT_PROFILE)"). For a
# release CLIENT_PROFILE is cleared, leaving the Maven options untouched.
# Reading the version (rather than hard-coding the profile) keeps every
# questdb-building job working whichever way questdb master flips next.
steps:
  - script: |
      git clone --depth 1 https://github.com/questdb/questdb.git
    displayName: git clone questdb
  - bash: |
      # No `pipefail`: the version extraction is `sed ... | head -1`, and
      # core/pom.xml carries the property on more than one line, so head can
      # close the pipe early and leave sed with SIGPIPE — under pipefail that
      # would fail the step. `set -eu` still aborts on a failed cd / submodule
      # checkout.
      set -eu
      cd questdb
      CLIENT_VERSION=$(sed -n 's/.*<questdb.client.version>\(.*\)<\/questdb.client.version>.*/\1/p' core/pom.xml | head -1)
      echo "questdb.client.version=$CLIENT_VERSION"
      if echo "$CLIENT_VERSION" | grep -q '\-SNAPSHOT$'; then
        echo "SNAPSHOT client -> build java-questdb-client submodule, activate local-client profile"
        git submodule update --init --depth 1 java-questdb-client
        echo "##vso[task.setvariable variable=CLIENT_PROFILE],local-client"
      else
        echo "Release client -> resolve questdb-client from Maven Central"
        echo "##vso[task.setvariable variable=CLIENT_PROFILE]"
      fi
    displayName: "Detect local client profile"
