# Long-running soak / stress pipeline (see doc/SOAK_HARNESS_DESIGN.md §9).
#
# Every PR to main runs the full ~1h soak against a QuestDB built from master.
#   * SoakSelftest   — cheap (~minutes) fail-fast pre-gate: runs the harness
#                      component selftests, compiles the workload crate, and
#                      asserts the Rust and Python generators produce
#                      byte-identical golden vectors. A broken harness fails
#                      here in minutes instead of after the hour.
#   * SoakFull       — the actual 1h soak; runs after SoakSelftest passes.
#
# Manual dispatch parameters let an operator widen or shorten a run and pin a
# seed for reproduction.

parameters:
  - name: soakDurationMin
    displayName: "SoakFull duration (minutes)"
    type: number
    default: 60
  - name: soakSeed
    displayName: "Seed (blank = build id)"
    type: string
    default: ""
  - name: soakProfile
    displayName: "Profile"
    type: string
    default: full
    values:
      - full
      - sanitize
      - quick

trigger: none

# Run on every PR to main — the 1h soak gates each change (add a `paths`
# filter here if doc-only PRs should skip it).
pr:
  branches:
    include:
      - main

stages:
  - stage: Soak
    displayName: "Soak / stress"
    jobs:
      # --------------------------------------------------------------------
      # Fast harness self-test — the fail-fast pre-gate before the 1h soak.
      # --------------------------------------------------------------------
      - job: SoakSelftest
        displayName: "Harness selftests + generator parity"
        pool:
          vmImage: "ubuntu-latest"
        timeoutInMinutes: 30
        steps:
          - checkout: self
            fetchDepth: 1
            lfs: false
            submodules: false
          - bash: |
              set -eux
              # Pure-stdlib Python selftests — the fault proxy, generator,
              # oracle, and orchestrator each verify their own logic
              # (including planted-bug detection in the oracle).
              python3 system_test/soak/fault_proxy.py selftest
              python3 system_test/soak/gen.py selftest
              python3 system_test/soak/oracle.py selftest
              python3 system_test/soak/soak.py selftest
            displayName: "Python component selftests"
          - bash: |
              set -eux
              # Compiles the workload crate (incl. the leg drivers against
              # questdb-rs) and runs the std-only generator + journal tests.
              cargo test --manifest-path system_test/soak/workload_rs/Cargo.toml
            displayName: "Workload crate: build + unit tests"
          - bash: |
              set -eux
              # Cross-language contract: the Rust reference and the Python
              # mirror must emit byte-identical golden vectors.
              cargo build --release \
                --manifest-path system_test/soak/workload_rs/Cargo.toml
              BIN=system_test/soak/workload_rs/target/release/soak-workload
              for seed in 1 7 12345; do
                "$BIN" gen-vectors --seed "$seed" --rows 200 > /tmp/rust_vec.txt
                python3 system_test/soak/gen.py gen-vectors --seed "$seed" \
                  --rows 200 > /tmp/py_vec.txt
                diff -u /tmp/rust_vec.txt /tmp/py_vec.txt
              done
            displayName: "Generator parity (Rust vs Python golden vectors)"

      # --------------------------------------------------------------------
      # The real 1h soak — runs on every PR after the fast pre-gate passes.
      # --------------------------------------------------------------------
      - job: SoakFull
        displayName: "Soak vs QuestDB master (linux/hetzner-incus)"
        dependsOn: SoakSelftest
        condition: succeeded()
        pool:
          name: hetzner-incus
        timeoutInMinutes: ${{ add(parameters.soakDurationMin, 45) }}
        variables:
          imageName: hetzner-incus
          soakSeedResolved: ${{ coalesce(parameters.soakSeed, '$(Build.BuildId)') }}
        steps:
          - checkout: self
            fetchDepth: 1
            lfs: false
            submodules: false
          - bash: |
              rm -rf /tmp/soak-out /tmp/junit* /tmp/libquestdbr*
            displayName: "Cleanup /tmp leftovers"
          - bash: |
              set -eux
              sudo apt-get update
              sudo apt-get install -y --no-install-recommends cmake python3-pip
              sudo python3 -m pip install --break-system-packages psutil
              JAVA_PATH_25="/usr/lib/jvm/java-25-openjdk-amd64"
              set +x
              echo "##vso[task.setvariable variable=JAVA_HOME]$JAVA_PATH_25"
            displayName: "Install deps + resolve JDK"
          - bash: |
              set -eux
              if [ -f /etc/profile.d/rust.sh ]; then . /etc/profile.d/rust.sh || true; fi
              if [ -f "$HOME/.cargo/env" ]; then . "$HOME/.cargo/env" || true; fi
              # `--features dataframe` pulls polars for the rust-col-df leg.
              cargo build --release --features dataframe \
                --manifest-path system_test/soak/workload_rs/Cargo.toml
            displayName: "Build workload (release, incl. DataFrame leg)"
          - template: templates/clone_questdb.yaml
          - bash: |
              set -eux
              if [ -f /etc/profile.d/rust.sh ]; then . /etc/profile.d/rust.sh || true; fi
              if [ -f "$HOME/.cargo/env" ]; then . "$HOME/.cargo/env" || true; fi
              python3 system_test/soak/soak.py run \
                --repo ./questdb \
                --profile ${{ parameters.soakProfile }} \
                --duration ${{ parameters.soakDurationMin }} \
                --seed "$(soakSeedResolved)" \
                --outdir /tmp/soak-out
            displayName: "Run soak (${{ parameters.soakProfile }}, ${{ parameters.soakDurationMin }} min)"
          - task: PublishBuildArtifacts@1
            displayName: "Publish soak artifacts (stats / summary / journals)"
            condition: always()
            inputs:
              pathToPublish: /tmp/soak-out
              artifactName: soak-out

      # --------------------------------------------------------------------
      - job: NotifyOnFailure
        displayName: "Notify Slack on failure"
        dependsOn:
          - SoakSelftest
          - SoakFull
        condition: failed()
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - checkout: none
          - task: CmdLine@2
            displayName: Notify Slack on Failure
            inputs:
              script: |
                curl -X POST -H 'Content-type: application/json' \
                  --data '{"text":"🚨 *c-questdb-client soak failed*\n\nBranch: `$(Build.SourceBranchName)`\nBuild: <$(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)|#$(Build.BuildId)>\nCommit: `$(Build.SourceVersion)`"}' \
                  "$(BUILDS_SLACK_HOOK_URL)"
            env:
              BUILDS_SLACK_HOOK_URL: $(BUILDS_SLACK_HOOK_URL)
