steps:
  - bash: |
      df -h /
      sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                  /opt/hostedtoolcache/CodeQL /usr/local/share/boost || true
      sudo docker image prune --all --force >/dev/null 2>&1 || true
      df -h /
    condition: eq(variables['imageName'], 'ubuntu-latest')
    displayName: "Free disk space (Microsoft-hosted ubuntu)"
  - bash: |
      echo "##vso[task.setvariable variable=CARGO_INCREMENTAL]0"
    condition: eq(variables['imageName'], 'ubuntu-latest')
    displayName: "Disable cargo incremental on Linux (saves ~30-50% target/ size)"
  - script: |
      rustup update $(toolchain)
      rustup default $(toolchain)
    condition: ne(variables['toolchain'], '')
    displayName: "Update and set Rust toolchain"
  - script: |
      brew install numpy
      python3 -m pip install --break-system-packages pyarrow polars
    condition: eq(variables['imageName'], 'macos-latest')
    displayName: "Install numpy + pyarrow + polars on macOS"
  - script: |
      python -m pip install --upgrade pip
      pip install numpy pyarrow polars
    condition: |
      and(
        ne(variables['imageName'], 'macos-latest'),
        ne(variables['imageName'], 'hetzner-incus')
      )
    displayName: "Install Python Dependencies"
  - script: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DQUESTDB_TESTS_AND_EXAMPLES=ON
    env:
      JAVA_HOME: $(JAVA_HOME_17_X64)
    displayName: "Build Makefile with CMake"
  - script: cmake --build build --config Release
    env:
      JAVA_HOME: $(JAVA_HOME_17_X64)
    displayName: "Make"
  - script: cmake -S . -B build_CXX20 -DCMAKE_BUILD_TYPE=Release -DQUESTDB_TESTS_AND_EXAMPLES=ON -DCMAKE_CXX_STANDARD=20
    env:
      JAVA_HOME: $(JAVA_HOME_17_X64)
    displayName: "Build Makefile with CMake"
  - script: cmake --build build_CXX20 --config Release
    env:
      JAVA_HOME: $(JAVA_HOME_17_X64)
    displayName: "Make"
