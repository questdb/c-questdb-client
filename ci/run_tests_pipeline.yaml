trigger: none

variables:
  OS_MAPPING: none
  Windows_NT-X86: windows
  Darwin-X64: osx
  Darwin-ARM: armosx
  Linux-ARM: armlinux
  Linux-X64: linux

stages:
  - stage: BuildAndTest
    displayName: "Building and testing"
    jobs:
      # mac/Windows legs of the build+test matrix stay on Microsoft-hosted
      # images — hetzner-incus is Linux/amd64-only. The four Linux toolchain
      # legs were split out into RunOnLinux below.
      - job: RunOn
        displayName: "on"
        strategy:
          matrix:
            mac:
              imageName: "macos-latest"
            windows-msvc-2022:
              imageName: "windows-2022"
            windows-msvc-2025:
              imageName: "windows-2025"
        pool:
          vmImage: $(imageName)
        timeoutInMinutes: 60
        steps:
          - checkout: self
            fetchDepth: 1
            lfs: false
            submodules: false
          - template: templates/compile.yaml
          - script: |
              cd questdb-rs
              cargo build --examples --features almost-all-features
            displayName: "Build Rust examples"
          - script: python3 ci/run_all_tests.py
            env:
              JAVA_HOME: $(JAVA_HOME_17_X64)
            displayName: "Tests"

      # Linux legs of the build+test matrix (the four Rust toolchains) on the
      # self-hosted hetzner-incus pool. Split out of RunOn because incus needs
      # a prep preamble the mac/Windows legs must not run — mirroring the
      # TestQwpWsFuzz / TestQwpWsFuzzLinux split below. incus_prepare installs
      # cmake (apt) and numpy>=2 (pip, via pipNumpy — the full system_test
      # suite needs numpy 2.x), exports the image JDKs, and provisions a
      # user-writable rustup so the beta/nightly legs can install their
      # toolchains. imageName='hetzner-incus' tells compile.yaml to skip its
      # pip step. run_all_tests.py downloads and runs a QuestDB 9.2.0 release,
      # so the Tests step needs JDK 17 ($(JAVA_HOME_17_X64)).
      - job: RunOnLinux
        displayName: "on linux"
        strategy:
          matrix:
            linux:
              imageName: "hetzner-incus"
            linux-stable:
              imageName: "hetzner-incus"
              toolchain: "stable"
            linux-beta:
              imageName: "hetzner-incus"
              toolchain: "beta"
            linux-nightly:
              imageName: "hetzner-incus"
              toolchain: "nightly"
        pool:
          name: hetzner-incus
        timeoutInMinutes: 60
        steps:
          - checkout: self
            fetchDepth: 1
            lfs: false
            submodules: false
          - template: templates/incus_prepare.yaml
            parameters:
              aptPackages:
                - cmake
              pipNumpy: true
          - template: templates/compile.yaml
          - script: |
              cd questdb-rs
              cargo build --examples --features almost-all-features
            displayName: "Build Rust examples"
          - script: python3 ci/run_all_tests.py
            env:
              JAVA_HOME: $(JAVA_HOME_17_X64)
            displayName: "Tests"
      - job: FormatAndLinting
        displayName: "cargo fmt and clippy"
        pool:
          name: hetzner-incus
        timeoutInMinutes: 10
        steps:
          - checkout: self
          - template: templates/incus_prepare.yaml
            parameters:
              aptPackages:
                - clang-format
          - script: |
              rustup component add clippy rustfmt
            displayName: "Add clippy and rustfmt components"
          - script: |
              cd questdb-rs
              cargo fmt --all -- --check
            displayName: "questdb-rs: fmt"
          - script: |
              cd questdb-rs
              # `live-server-tests` is included here so the live-server
              # suite (egress_live_server*, egress_live_auth) is compiled
              # and clippy-linted on every PR even though *running* it
              # needs a real server. Without this the suite builds only in
              # the live-server job and silently rots — removed APIs, new
              # clippy lints — undetected.
              cargo clippy --all-targets --features almost-all-features,live-server-tests -- -D warnings
            displayName: "questdb-rs: clippy"
          - script: |
              cd questdb-rs-ffi
              cargo fmt --all -- --check
            displayName: "questdb-rs-ffi: fmt"
          - script: |
              cd questdb-rs-ffi
              cargo clippy --all-targets --all-features -- -D warnings
            displayName: "questdb-rs-ffi: clippy"
          - script: |
              python3 ci/format_cpp.py --check
            displayName: "C/C++ clang-format"
          - script: |
              cd system_test
              cd tls_proxy
              cargo fmt --all -- --check
            displayName: "tls_proxy: fmt"
          - script: |
              cd system_test
              cd tls_proxy
              cargo clippy --all-targets --all-features -- -D warnings
            displayName: "tls_proxy: clippy"
          - script: |
              cd system_test
              cd failover_clients
              cargo fmt --all -- --check
            displayName: "failover_clients: fmt"
          - script: |
              cd system_test
              cd failover_clients
              cargo clippy --all-targets --all-features
            displayName: "failover_clients: clippy"
      - job: SanitizeCppTests
        displayName: "C/C++ tests under ASan + UBSan"
        pool:
          name: hetzner-incus
        timeoutInMinutes: 60
        steps:
          - checkout: self
            fetchDepth: 1
            lfs: false
            submodules: false
          # cargo (for the corrosion-built Rust FFI lib) comes from the
          # template; numpy is not needed here, so only cmake is apt-installed.
          - template: templates/incus_prepare.yaml
            parameters:
              aptPackages:
                - cmake
          - script: |
              cmake -S . -B build_sanitize \
                -DCMAKE_BUILD_TYPE=RelWithDebInfo \
                -DQUESTDB_TESTS_AND_EXAMPLES=ON \
                -DQUESTDB_SANITIZE=ON
            displayName: "Configure (ASan + UBSan)"
          - script: cmake --build build_sanitize --config Release
            displayName: "Build"
          - script: ctest --output-on-failure -E rust_tests
            workingDirectory: build_sanitize
            displayName: "ctest under ASan + UBSan"
      # Runs the integration matrix (system_test/test.py) and the
      # mid-query failover suite (system_test/test_egress_failover.py)
      # against the prebuilt QuestDB *nightly docker image* instead of a
      # from-source build of master. The nightly image tracks master, so
      # this keeps the "did QuestDB master break the client?" signal while
      # dropping the Maven + Rust from-source build entirely. The server
      # runs in a container (config injected via QDB_* env vars, ports
      # published 1:1 on loopback); the failover crash is a `docker kill`
      # (SIGKILL), the graceful path a `docker stop` (SIGTERM).
      #
      # Runs on the self-hosted hetzner-incus pool: the image ships docker
      # (the `agent` user is in the docker group) and the dedicated hosts
      # have more disk headroom than Microsoft-hosted. The server runs in an
      # ephemeral container (removed between configs), so there is no on-host
      # server data; incus_prepare apt-installs cmake and pip-installs numpy>=2
      # (the integration suite's test_f64_arr_max_dims needs numpy 2.x).
      #
      # Scope note: the nightly image is Linux/amd64 only, so the
      # mac/windows fuzz legs stay from-source, as does any run that must
      # test a specific commit not yet in nightly. QWP UDP is not
      # exercised here (it is gated on `--repo` in test.py); that
      # coverage still runs in the from-source jobs.
      - job: TestVsQuestDBNightly
        displayName: "Vs QuestDB nightly (docker)"
        pool:
          name: hetzner-incus
        timeoutInMinutes: 90
        variables:
          imageName: hetzner-incus
          QUESTDB_IMAGE: "questdb/questdb:nightly"
        steps:
          - checkout: self
            fetchDepth: 1
            lfs: false
            submodules: false
          - template: templates/incus_prepare.yaml
            parameters:
              aptPackages:
                - cmake
              pipNumpy: true
          - template: templates/compile.yaml
          - script: |
              docker pull $(QUESTDB_IMAGE)
            displayName: "Pull QuestDB nightly image"
          - script: |
              python3 system_test/test.py run --docker $(QUESTDB_IMAGE) -v
            displayName: "integration test (docker)"
          - script: |
              python3 system_test/test_egress_failover.py run --docker $(QUESTDB_IMAGE) -v
            displayName: "egress failover test (docker)"
          - task: ArchiveFiles@2
            displayName: "Compress QuestDB server log on failure"
            condition: failed()
            continueOnError: true
            inputs:
              # The docker fixtures capture `docker logs` under build/questdb/
              # (docker/, server1/, server2/) since the containers are
              # removed on stop().
              rootFolderOrFile: $(Build.SourcesDirectory)/build/questdb
              includeRootFolder: false
              archiveType: zip
              archiveFile: $(Build.ArtifactStagingDirectory)/qdb-log-vs-nightly-$(Agent.OS).zip
              quiet: true
          - task: PublishBuildArtifacts@1
            displayName: "Publish QuestDB server log on failure"
            condition: failed()
            continueOnError: true
            inputs:
              pathToPublish: $(Build.ArtifactStagingDirectory)/qdb-log-vs-nightly-$(Agent.OS).zip
              artifactName: qdb-log-vs-nightly-$(Agent.OS)
      - job: TestQwpWsFuzz
        displayName: "QWP/WS fuzz suite (mac/windows hosted)"
        strategy:
          matrix:
            mac:
              imageName: "macos-latest"
            windows-2022:
              imageName: "windows-2022"
        pool:
          vmImage: $(imageName)
        timeoutInMinutes: 90
        steps:
          - checkout: self
            fetchDepth: 1
            lfs: false
            submodules: false
          - template: templates/compile.yaml
          # Linux and Windows runners ship with JDK 25 at $JAVA_HOME_25_X64.
          # macOS-latest doesn't, so we brew-install openjdk@25 there and
          # discover its install location with `brew --prefix`. Both
          # paths set JAVA_HOME via a single bash step so the Windows
          # version doesn't trip on cmd.exe's quote handling
          # (`echo "##vso[...]$x"` in cmd preserves the surrounding
          # quotes, which previously made Maven@3 see a stray `"` at
          # the end of the JDK path).
          - bash: |
              set -e
              if [[ "$AGENT_OS" == "Darwin" ]]; then
                brew install openjdk@25
                JDK_HOME="$(brew --prefix openjdk@25)/libexec/openjdk.jdk/Contents/Home"
                if [ ! -d "$JDK_HOME" ]; then
                  JDK_HOME="$(/usr/libexec/java_home -v 25 2>/dev/null || true)"
                fi
                if [ ! -d "$JDK_HOME" ]; then
                  echo "JDK 25 not found after brew install" >&2
                  exit 1
                fi
              else
                JDK_HOME="$JAVA_HOME_25_X64"
              fi
              echo "Resolved JDK 25: $JDK_HOME"
              echo "##vso[task.setvariable variable=JAVA_HOME]$JDK_HOME"
            displayName: "Resolve JDK 25"
          - template: templates/clone_questdb.yaml
          - task: Maven@3
            displayName: "Compile QuestDB"
            inputs:
              mavenPOMFile: "questdb/pom.xml"
              javaHomeOption: "Path"
              jdkDirectory: "$(JAVA_HOME)"
              options: "-DskipTests -Pbuild-web-console$(CLIENT_PROFILE)"
          - script: |
              python3 system_test/test.py run --repo ./questdb TestQwpWsFuzz -v
            displayName: "TestQwpWsFuzz"
          # Mirrors ci/run_fuzz_pipeline.yaml: on failure, archive and
          # publish the QuestDB server log so PR reviewers don't have to
          # repro locally. Path comes from system_test/fixture.py:_log_path.
          - task: ArchiveFiles@2
            displayName: "Compress QuestDB server log on failure"
            condition: failed()
            continueOnError: true
            inputs:
              rootFolderOrFile: $(Build.SourcesDirectory)/build/questdb/repo/data/log
              includeRootFolder: false
              archiveType: zip
              archiveFile: $(Build.ArtifactStagingDirectory)/qdb-log-$(Agent.OS).zip
              quiet: true
          - task: PublishBuildArtifacts@1
            displayName: "Publish QuestDB server log on failure"
            condition: failed()
            continueOnError: true
            inputs:
              pathToPublish: $(Build.ArtifactStagingDirectory)/qdb-log-$(Agent.OS).zip
              artifactName: qdb-log-$(Agent.OS)

      # Linux leg on self-hosted hetzner-incus — mirrors the equivalent job in
      # ci/run_fuzz_pipeline.yaml. incus_prepare handles the agent prep (apt
      # cmake + python3-numpy, JDK paths, user-writable rustup);
      # imageName='hetzner-incus' tells compile.yaml to skip its pip step.
      - job: TestQwpWsFuzzLinux
        displayName: "QWP/WS fuzz suite (linux/hetzner-incus)"
        pool:
          name: hetzner-incus
        timeoutInMinutes: 90
        variables:
          imageName: hetzner-incus
        steps:
          - checkout: self
            fetchDepth: 1
            lfs: false
            submodules: false
          - template: templates/incus_prepare.yaml
          - template: templates/compile.yaml
          - template: templates/clone_questdb.yaml
          - task: Maven@3
            displayName: "Compile QuestDB"
            inputs:
              mavenPOMFile: "questdb/pom.xml"
              javaHomeOption: "Path"
              jdkDirectory: "$(JAVA_HOME)"
              options: "-DskipTests -Pbuild-web-console$(CLIENT_PROFILE)"
          - script: |
              python3 system_test/test.py run --repo ./questdb TestQwpWsFuzz -v
            displayName: "TestQwpWsFuzz"
          - task: ArchiveFiles@2
            displayName: "Compress QuestDB server log on failure"
            condition: failed()
            continueOnError: true
            inputs:
              rootFolderOrFile: $(Build.SourcesDirectory)/build/questdb/repo/data/log
              includeRootFolder: false
              archiveType: zip
              archiveFile: $(Build.ArtifactStagingDirectory)/qdb-log-$(Agent.OS).zip
              quiet: true
          - task: PublishBuildArtifacts@1
            displayName: "Publish QuestDB server log on failure"
            condition: failed()
            continueOnError: true
            inputs:
              pathToPublish: $(Build.ArtifactStagingDirectory)/qdb-log-$(Agent.OS).zip
              artifactName: qdb-log-$(Agent.OS)-linux

      # Live-server coverage for the OSS-questdb tests that need a real
      # server: the functional egress suite (egress_live_server) plus the
      # fuzz binaries (bind / fragmentation / random-schema / ALTER
      # orchestration), each as its own step below. Default seed gives a
      # deterministic sweep for inbound changes; the hourly cron in
      # run_fuzz_pipeline.yaml varies the seed per build.
      - job: TestQwpEgressLiveServerFuzz
        displayName: "QWP egress live-server suite"
        pool:
          name: hetzner-incus
        variables:
          imageName: hetzner-incus
        timeoutInMinutes: 30
        steps:
          - checkout: self
            fetchDepth: 1
            lfs: false
            submodules: false
          - template: templates/incus_prepare.yaml
          - template: templates/compile.yaml
          - template: templates/clone_questdb.yaml
          # JDK 25 (required to build QuestDB master) is provided by the
          # image; incus_prepare already points JAVA_HOME at it, so the Maven
          # task's "default" jdkVersionOption picks it up. No adoptium
          # download needed.
          - task: Maven@3
            displayName: "Compile QuestDB"
            inputs:
              mavenPOMFile: "questdb/pom.xml"
              jdkVersionOption: "default"
              options: "-DskipTests -Pbuild-web-console$(CLIENT_PROFILE)"
          - script: |
              set -euxo pipefail
              cd questdb-rs
              # `--test NAME` selectors limit this step to the fuzz
              # binaries; the functional suite runs as its own step below.
              cargo test --features live-server-tests \
                --test egress_live_server_bind_fuzz \
                --test egress_live_server_fragmentation_fuzz \
                --test egress_live_server_fuzz \
                --test egress_live_server_alter_fuzz \
                -- --nocapture
            displayName: "QWP egress live-server fuzz"
          - script: |
              set -euxo pipefail
              cd questdb-rs
              # Functional egress suite (per-type decode, cursor lifecycle,
              # error taxonomy, null handling) against the same Maven-built
              # server — behavioral coverage the fuzz binaries don't give.
              cargo test --features live-server-tests --test egress_live_server -- --nocapture
            displayName: "QWP egress live-server functional suite"

      # Cross-repo trigger: fire the questdb-enterprise
      # build-and-test-e2e-c-client pipeline with this build's SHA so
      # the c_client-marked failover tests (Rust today; C / C++ as
      # those sidecars land) run against an Enterprise primary. The
      # Enterprise pipeline posts a status check back on the PR
      # (`enterprise-e2e-c-client` context); this job fire-and-forgets
      # and does not block the PR.
      #
      # Fork PRs are intentionally skipped: System.AccessToken is not
      # exposed to fork builds, so the dispatch call would fail with
      # 401. We'd rather skip silently than spam fork PRs with
      # spurious red checks.
      #
      # Prerequisites the questdb infra team needs to have configured
      # (one-time, in the Azure DevOps UI):
      #   1. Register ci/build-and-test-e2e-c-client.yaml in the
      #      `questdb-enterprise` ADO project as a pipeline. Name must
      #      match `enterprisePipelineName` below.
      #   2. Create a PAT in the `questdb-enterprise` ADO project
      #      with `Build (Read & execute)` scope (User settings →
      #      Personal access tokens → New). Add it as a secret
      #      variable on THIS pipeline named ENT_DISPATCH_PAT
      #      (Pipelines → questdb.c-questdb-client → Edit →
      #      Variables → +, mark as secret). PAT-based auth is used
      #      rather than $(System.AccessToken) because the two
      #      pipelines live in different ADO projects, and tokens
      #      issued for this project can't see the Enterprise
      #      project's pipelines API without it.
      - job: TriggerEnterpriseCClientE2E
        displayName: "Trigger questdb-enterprise c_client e2e"
        # Use the hetzner-incus self-hosted pool: the Microsoft-hosted
        # queue is consistently deeper than incus, and this is a
        # ~10-second curl+jq job so it picks up a slot quickly here.
        # The hetzner image already ships curl + jq (the Enterprise
        # ReportToOssPr stage uses both).
        pool:
          name: hetzner-incus
        # Skip on fork PRs: secret pipeline variables (and System
        # tokens) are not exposed to fork builds, so the REST POST
        # would 401. Skipping rather than failing keeps fork-PR CI
        # clean.
        condition: and(succeeded(), ne(variables['System.PullRequest.IsFork'], 'True'))
        variables:
          # Hardcoded because the Enterprise pipeline lives in its own
          # ADO project, not the one this pipeline runs in.
          enterpriseProject: 'questdb-enterprise'
          enterprisePipelineName: 'build-and-test-e2e-c-client'
        steps:
          - checkout: none
          - bash: |
              set -euo pipefail

              ORG_URL="$(System.TeamFoundationCollectionUri)"
              PROJECT="$(enterpriseProject)"
              PIPELINE_NAME="$(enterprisePipelineName)"

              if [ -z "${ENT_DISPATCH_PAT:-}" ]; then
                echo "ERROR: ENT_DISPATCH_PAT secret pipeline variable is not set." >&2
                echo "Create a PAT in the questdb-enterprise ADO project with" >&2
                echo "'Build (Read & execute)' scope and add it as a secret" >&2
                echo "variable named ENT_DISPATCH_PAT on this pipeline." >&2
                exit 1
              fi

              # Resolve pipeline ID by name. The pipelines list API
              # returns every pipeline in the project; we filter
              # client-side because the $filter query parameter on
              # this endpoint is limited.
              echo "Looking up '${PIPELINE_NAME}' in '${PROJECT}'..."
              PIPELINES=$(curl -fsS -u ":${ENT_DISPATCH_PAT}" \
                "${ORG_URL}${PROJECT}/_apis/pipelines?api-version=7.0")
              PIPELINE_ID=$(echo "$PIPELINES" | jq -r --arg n "$PIPELINE_NAME" \
                '.value[] | select(.name == $n) | .id' | head -1)

              if [ -z "$PIPELINE_ID" ] || [ "$PIPELINE_ID" = "null" ]; then
                echo "ERROR: pipeline '${PIPELINE_NAME}' not found in project '${PROJECT}'." >&2
                echo "Register ci/build-and-test-e2e-c-client.yaml in" >&2
                echo "the Azure DevOps UI under that name to enable the" >&2
                echo "cross-repo c_client e2e check." >&2
                exit 1
              fi

              CLIENT_PR_NUMBER="$(System.PullRequest.PullRequestNumber)"
              if [ -z "${CLIENT_PR_NUMBER}" ] || [ "${CLIENT_PR_NUMBER}" = "None" ]; then
                # Branch builds (e.g. nightly on main) still benefit
                # from the cross-repo check, but there's no PR number
                # to attach a status to. The Enterprise pipeline's
                # report stage skips the GitHub-status POST when
                # cClientPrNumber is empty.
                CLIENT_PR_NUMBER=""
              fi

              # Forward the client branch name as a hint for the
              # Enterprise side to try a same-name branch match
              # (xyz → xyz, fallback to main). For a PR build,
              # System.PullRequest.SourceBranch is `refs/heads/xyz`;
              # for a direct branch build the branch name is in
              # Build.SourceBranchName already. Strip refs/heads/ so
              # the Enterprise step can use it directly as a git ref.
              if [ "$(Build.Reason)" = "PullRequest" ]; then
                CLIENT_BRANCH="$(System.PullRequest.SourceBranch)"
                CLIENT_BRANCH="${CLIENT_BRANCH#refs/heads/}"
              else
                CLIENT_BRANCH="$(Build.SourceBranchName)"
              fi
              echo "Client branch hint: ${CLIENT_BRANCH}"

              # `templateParameters` matches the `parameters:` block
              # in build-and-test-e2e-c-client.yaml.
              BODY=$(jq -n \
                --arg commit "$(Build.SourceVersion)" \
                --arg pr "${CLIENT_PR_NUMBER}" \
                --arg branch "${CLIENT_BRANCH}" \
                '{
                  templateParameters: {
                    cClientCommit: $commit,
                    cClientPrNumber: $pr,
                    clientBranch: $branch
                  },
                  resources: { repositories: { self: { refName: "refs/heads/main" } } }
                }')

              echo "POSTing pipeline run with body:"
              echo "$BODY" | jq .

              RESPONSE=$(curl -fsS -u ":${ENT_DISPATCH_PAT}" \
                -H "Content-Type: application/json" \
                -X POST \
                -d "$BODY" \
                "${ORG_URL}${PROJECT}/_apis/pipelines/${PIPELINE_ID}/runs?api-version=7.0")

              RUN_URL=$(echo "$RESPONSE" | jq -r '._links.web.href // ""')
              echo "Enterprise build queued: ${RUN_URL}"
            displayName: "Queue enterprise c_client e2e"
            env:
              # The PAT is a secret pipeline variable that must be set
              # on this pipeline in the ADO UI (Variables → +, name
              # ENT_DISPATCH_PAT, mark as secret). Secret variables
              # aren't auto-exposed to script env; the explicit
              # `env:` mapping below is required.
              ENT_DISPATCH_PAT: $(ENT_DISPATCH_PAT)
