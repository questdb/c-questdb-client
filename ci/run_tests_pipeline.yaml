trigger: none

variables:
  OS_MAPPING: none
  Windows_NT-X86: windows
  Darwin-X64: osx
  Darwin-ARM: armosx
  Linux-ARM: armlinux
  Linux-X64: linux

stages:
  - stage: BuildAndTest
    displayName: "Building and testing"
    jobs:
      - job: RunOn
        displayName: "on"
        strategy:
          matrix:
            linux:
              imageName: "ubuntu-latest"
              poolName: "Azure Pipelines"
            linux-stable:
              imageName: "ubuntu-latest"
              poolName: "Azure Pipelines"
              toolchain: "stable"
            linux-beta:
              imageName: "ubuntu-latest"
              poolName: "Azure Pipelines"
              toolchain: "beta"
            linux-nightly:
              imageName: "ubuntu-latest"
              poolName: "Azure Pipelines"
              toolchain: "nightly"
            mac:
              imageName: "macos-latest"
              poolName: "Azure Pipelines"
            windows-msvc-2022:
              imageName: "windows-2022"
              poolName: "Azure Pipelines"
            windows-msvc-2025:
              imageName: "windows-2025"
              poolName: "Azure Pipelines"
        pool:
          name: $(poolName)
          vmImage: $(imageName)
        timeoutInMinutes: 60
        steps:
          - checkout: self
            fetchDepth: 1
            lfs: false
            submodules: false
          - template: compile.yaml
          - script: |
              cd questdb-rs
              cargo build --examples --features almost-all-features
            displayName: "Build Rust examples"
          ############################# temp for test begin #####################
          #- script: |
          #    git clone --depth 1 https://github.com/questdb/questdb.git ./questdb
          #  displayName: git clone questdb
          #- task: Maven@3
          #  displayName: "Compile QuestDB"
          #  inputs:
          #    mavenPOMFile: "questdb/pom.xml"
          #    jdkVersionOption: "1.17"
          #    options: "-DskipTests -Pbuild-web-console"
          ############################# temp for test end #####################
          - script: python3 ci/run_all_tests.py
            env:
              JAVA_HOME: $(JAVA_HOME_17_X64)
            displayName: "Tests"
          # - task: PublishBuildArtifacts@1
          #   inputs:
          #     pathToPublish: ./build
          #   displayName: "Publish build directory"
      - job: FormatAndLinting
        displayName: "cargo fmt and clippy"
        pool:
          vmImage: "ubuntu-latest"
        timeoutInMinutes: 10
        steps:
          - checkout: self
          - script: |
              apt install clang-format
              rustup component add clippy
              rustup component add rustfmt
            displayName: "Install clang-format, clippy and rustfmt"
          - script: |
              cd questdb-rs
              cargo fmt --all -- --check
            displayName: "questdb-rs: fmt"
          - script: |
              cd questdb-rs
              cargo clippy --all-targets --features almost-all-features -- -D warnings
            displayName: "questdb-rs: clippy"
          - script: |
              cd questdb-rs-ffi
              cargo fmt --all -- --check
            displayName: "questdb-rs-ffi: fmt"
          - script: |
              cd questdb-rs-ffi
              cargo clippy --all-targets --all-features -- -D warnings
            displayName: "questdb-rs-ffi: clippy"
          - script: |
              python3 ci/format_cpp.py --check
            displayName: "C/C++ clang-format"
          - script: |
              cd system_test
              cd tls_proxy
              cargo fmt --all -- --check
            displayName: "tls_proxy: fmt"
          - script: |
              cd system_test
              cd tls_proxy
              cargo clippy --all-targets --all-features -- -D warnings
            displayName: "tls_proxy: clippy"
          - script: |
              cd system_test
              cd failover_clients
              cargo fmt --all -- --check
            displayName: "failover_clients: fmt"
          - script: |
              cd system_test
              cd failover_clients
              cargo clippy --all-targets --all-features -- -D warnings
            displayName: "failover_clients: clippy"
      - job: TestVsQuestDBMaster
        displayName: "Vs QuestDB 'master'"
        pool:
          vmImage: "ubuntu-latest"
        timeoutInMinutes: 60
        steps:
          - checkout: self
            fetchDepth: 1
            lfs: false
            submodules: false
          - template: compile.yaml
          - script: |
              git clone --depth 1 https://github.com/questdb/questdb.git
            displayName: git clone questdb
          - script: |
              set -euo pipefail
              JDK_URL="https://api.adoptium.net/v3/binary/latest/25/ga/linux/x64/jdk/hotspot/normal/eclipse"
              sudo mkdir -p /opt/jdk25
              curl -fsSL "$JDK_URL" | sudo tar -xz -C /opt/jdk25 --strip-components=1
              echo "##vso[task.setvariable variable=JAVA_HOME]/opt/jdk25"
              echo "##vso[task.prependpath]/opt/jdk25/bin"
            displayName: "Install JDK 25 (required by QuestDB master)"
          - task: Maven@3
            displayName: "Compile QuestDB"
            inputs:
              mavenPOMFile: "questdb/pom.xml"
              jdkVersionOption: "default"
              options: "-DskipTests -Pbuild-web-console"
          - script: |
              python3 system_test/test.py run --repo ./questdb -v
            displayName: "integration test"
          - script: |
              python3 system_test/test_egress_failover.py run --repo ./questdb -v
            displayName: "egress integration test"
      # Per-PR live-server fuzz coverage for the OSS-questdb tests that
      # need a real server (bind / fragmentation / random-schema). Three
      # `--test NAME` selectors so cargo only builds the new fuzz
      # binaries — `egress_live_server.rs` has pre-existing compile
      # errors under `live-server-tests` on vi_egress (FailoverEvent
      # callback non-Send) that we don't want to inherit as a blocker.
      # Default seed gives a deterministic per-PR sweep; the hourly
      # cron in run_fuzz_pipeline.yaml varies the seed per build.
      - job: TestQwpEgressLiveServerFuzz
        displayName: "QWP egress live-server fuzz suite"
        pool:
          vmImage: "ubuntu-latest"
        timeoutInMinutes: 30
        steps:
          - checkout: self
            fetchDepth: 1
            lfs: false
            submodules: false
          - template: compile.yaml
          - script: |
              git clone --depth 1 https://github.com/questdb/questdb.git
            displayName: git clone questdb
          - script: |
              set -euo pipefail
              JDK_URL="https://api.adoptium.net/v3/binary/latest/25/ga/linux/x64/jdk/hotspot/normal/eclipse"
              sudo mkdir -p /opt/jdk25
              curl -fsSL "$JDK_URL" | sudo tar -xz -C /opt/jdk25 --strip-components=1
              echo "##vso[task.setvariable variable=JAVA_HOME]/opt/jdk25"
              echo "##vso[task.prependpath]/opt/jdk25/bin"
            displayName: "Install JDK 25 (required by QuestDB master)"
          - task: Maven@3
            displayName: "Compile QuestDB"
            inputs:
              mavenPOMFile: "questdb/pom.xml"
              jdkVersionOption: "default"
              options: "-DskipTests -Pbuild-web-console"
          - script: |
              set -euxo pipefail
              cd questdb-rs
              # `--test NAME` selectors skip the pre-existing broken
              # `egress_live_server.rs` build (FailoverEvent callback
              # non-Send; tracked upstream, not regressed here).
              cargo test --features live-server-tests \
                --test egress_live_server_bind_fuzz \
                --test egress_live_server_fragmentation_fuzz \
                --test egress_live_server_fuzz \
                -- --nocapture
            displayName: "QWP egress live-server fuzz"
