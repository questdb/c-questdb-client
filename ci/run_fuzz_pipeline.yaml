trigger: none

pr: none

# Hourly cron against the default branch, always run even if there were no
# changes since the previous run. Mirrors ia_qwp_ws's run_fuzz_pipeline.yaml
# pattern: keep the paid-minutes bill reasonable by running hourly on
# Microsoft-hosted images while the PR-time fuzz coverage stays in
# run_tests_pipeline.yaml. This pipeline is the always-on stability watchdog
# for the QWP egress proptest suites and the source of Slack #builds alerts.
schedules:
  - cron: "0 * * * *"
    displayName: Run QWP egress fuzz every hour
    branches:
      include:
        - main
    always: true

stages:
  - stage: ScheduledFuzz
    displayName: "Scheduled QWP egress fuzz"
    jobs:
      - job: TestQwpEgressFuzz
        displayName: "QWP egress fuzz suite (cross-platform)"
        strategy:
          matrix:
            linux:
              imageName: "ubuntu-latest"
            mac:
              imageName: "macos-latest"
            windows-2022:
              imageName: "windows-2022"
        pool:
          vmImage: $(imageName)
        timeoutInMinutes: 90
        steps:
          - checkout: self
            fetchDepth: 1
            lfs: false
            submodules: false
          - template: compile.yaml
          # The egress fuzz suites are pure-Rust proptest harnesses
          # (no server, no JDK). Crank PROPTEST_CASES well above the
          # in-source default so the hourly cron actually explores beyond
          # what a per-PR `cargo test` would. Failures replay locally via
          # the regression seeds checked in under
          # questdb-rs/proptest-regressions/egress/.
          - bash: |
              set -e
              cd questdb-rs
              PROPTEST_CASES=10000 cargo test --release \
                --features sync-reader-ws \
                --test qwp_egress_bounds_fuzz \
                --test qwp_egress_fragmentation_fuzz \
                egress::binds::tests \
                egress::decoder::tests
            displayName: "Run QWP egress fuzz suite"

      # Live-server fuzz: bind / fragmentation / random-schema cases that
      # need a real QuestDB. Builds the questdb jar from `master`, then
      # runs the three `egress_live_server_*_fuzz` cargo tests. Linux-only
      # for now — keeps the hourly Maven cost bounded; the per-PR coverage
      # in run_tests_pipeline.yaml already runs the same suite.
      # Seed varies per build via `QWP_EGRESS_FUZZ_SEED=$(Build.BuildId)`
      # so the hourly cron actually explores beyond the deterministic
      # default that the PR-time job uses.
      - job: TestQwpEgressLiveServerFuzz
        displayName: "QWP egress live-server fuzz (hourly)"
        pool:
          vmImage: "ubuntu-latest"
        timeoutInMinutes: 30
        steps:
          - checkout: self
            fetchDepth: 1
            lfs: false
            submodules: false
          - template: compile.yaml
          - script: |
              git clone --depth 1 https://github.com/questdb/questdb.git
            displayName: git clone questdb
          - script: |
              set -euo pipefail
              JDK_URL="https://api.adoptium.net/v3/binary/latest/25/ga/linux/x64/jdk/hotspot/normal/eclipse"
              sudo mkdir -p /opt/jdk25
              curl -fsSL "$JDK_URL" | sudo tar -xz -C /opt/jdk25 --strip-components=1
              echo "##vso[task.setvariable variable=JAVA_HOME]/opt/jdk25"
              echo "##vso[task.prependpath]/opt/jdk25/bin"
            displayName: "Install JDK 25"
          - task: Maven@3
            displayName: "Compile QuestDB"
            inputs:
              mavenPOMFile: "questdb/pom.xml"
              jdkVersionOption: "default"
              options: "-DskipTests -Pbuild-web-console"
          - script: |
              set -euxo pipefail
              cd questdb-rs
              # `--test NAME` selectors skip the pre-existing broken
              # `egress_live_server.rs` build (FailoverEvent callback
              # non-Send) that we don't want to inherit as a hourly
              # alert source.
              QWP_EGRESS_FUZZ_SEED="$(Build.BuildId)" \
                cargo test --features live-server-tests \
                --test egress_live_server_bind_fuzz \
                --test egress_live_server_fragmentation_fuzz \
                --test egress_live_server_fuzz \
                -- --nocapture
            displayName: "QWP egress live-server fuzz (varying seed)"

      # Mirrors ia_qwp_ws's NotifyOnFailure pattern. BUILDS_SLACK_HOOK_URL
      # must be configured as a secret pipeline variable (or attached via a
      # shared variable group) before this pipeline is enabled — otherwise
      # the curl POSTs to an empty URL and the failure message is lost.
      - job: NotifyOnFailure
        displayName: "Notify Slack on failure"
        dependsOn:
          - TestQwpEgressFuzz
          - TestQwpEgressLiveServerFuzz
        condition: failed()
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - checkout: none
          - task: CmdLine@2
            displayName: Notify Slack on Failure
            inputs:
              script: |
                curl -X POST -H 'Content-type: application/json' \
                  --data '{"text":"🚨 *c-questdb-client QWP egress fuzz failed*\n\nBranch: `$(Build.SourceBranchName)`\nBuild: <$(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)|#$(Build.BuildId)>\nCommit: `$(Build.SourceVersion)`"}' \
                  "$(BUILDS_SLACK_HOOK_URL)"
            env:
              BUILDS_SLACK_HOOK_URL: $(BUILDS_SLACK_HOOK_URL)
