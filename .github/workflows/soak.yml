name: soak

# Long-running soak / stress harness (see doc/SOAK_HARNESS_DESIGN.md).
# GitHub Actions (not the Azure pipelines in ci/): auto-runs, no registration.
#
#   * daily schedule      -> 2h deep run (fresh seed each run, fuzz-style)
#   * push to main (merge)-> 30 min regression run, attributable to the merge
#   * workflow_dispatch   -> manual, custom duration / seed
#
# A fast `selftest` pre-gate fails a broken harness in minutes before either
# soak spends its time. The full run uses a downloaded QuestDB release (no
# build-from-master), so it fits a GitHub-hosted runner — no self-hosted agent.

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * *"   # daily, 03:00 UTC
  workflow_dispatch:
    inputs:
      duration_min:
        description: "soak-full duration (minutes)"
        default: "120"
      seed:
        description: "seed (blank = run number)"
        default: ""

concurrency:
  # Separate groups per event so a merge run never cancels the daily deep run;
  # a newer merge cancels an older in-flight merge run.
  group: soak-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  selftest:
    name: Harness selftests + generator parity
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Python component selftests
        run: |
          set -euxo pipefail
          python3 system_test/soak/fault_proxy.py selftest
          python3 system_test/soak/gen.py selftest
          python3 system_test/soak/oracle.py selftest
          python3 system_test/soak/soak.py selftest
      - name: Workload crate build + unit tests
        run: cargo test --manifest-path system_test/soak/workload_rs/Cargo.toml
      - name: Generator parity (Rust vs Python golden vectors)
        run: |
          set -euxo pipefail
          cargo build --release --manifest-path system_test/soak/workload_rs/Cargo.toml
          BIN=system_test/soak/workload_rs/target/release/soak-workload
          for seed in 1 7 12345; do
            "$BIN" gen-vectors --seed "$seed" --rows 200 > /tmp/rust_vec.txt
            python3 system_test/soak/gen.py gen-vectors --seed "$seed" --rows 200 > /tmp/py_vec.txt
            diff -u /tmp/rust_vec.txt /tmp/py_vec.txt
          done

  soak-full:
    name: Soak vs QuestDB release
    needs: selftest
    runs-on: ubuntu-latest
    # Ceiling for the 2h daily run + build / download / reconcile overhead.
    timeout-minutes: 160
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Resolve duration + seed from the trigger
        run: |
          set -euxo pipefail
          case "${{ github.event_name }}" in
            schedule)         DUR=120 ;;                                  # daily deep run
            push)             DUR=30  ;;                                  # per-merge run
            workflow_dispatch) DUR="${{ github.event.inputs.duration_min }}" ;;
            *)                DUR=30  ;;
          esac
          SEED="${{ github.event.inputs.seed }}"
          [ -z "$SEED" ] && SEED="${{ github.run_number }}"
          echo "SOAK_DURATION_MIN=$DUR"  >> "$GITHUB_ENV"
          echo "SOAK_SEED=$SEED"          >> "$GITHUB_ENV"
      - name: Build workload (release, incl. DataFrame leg)
        run: cargo build --release --features dataframe --manifest-path system_test/soak/workload_rs/Cargo.toml
      - name: Run soak (downloads the latest QuestDB release)
        run: |
          set -euxo pipefail
          # No --repo => soak.py provisions the latest QuestDB release tarball,
          # not a master build.
          python3 system_test/soak/soak.py run \
            --duration "$SOAK_DURATION_MIN" \
            --seed "$SOAK_SEED" \
            --outdir soak-out
      - name: Upload soak artifacts (stats / summary / journals)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soak-out-${{ github.run_number }}
          path: soak-out
          if-no-files-found: warn
